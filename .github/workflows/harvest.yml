name: harvest-slugs

on:
  schedule:
    - cron: "0 7 * * *"     # daily 07:00 UTC — mine new ATS slugs from the repos
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.harvest
      - name: Commit harvested slugs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/harvested.yml
          git diff --cached --quiet || git commit -m "chore: harvest slugs $(date -u +%F)"
          git push
