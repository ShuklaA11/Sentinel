name: poll-internships

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (GitHub may delay under load)
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write              # to commit the updated seen-set / tracker

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Materialize profile for fit-scoring
        env:
          PROFILE_YML: ${{ secrets.PROFILE_YML }}
        run: |
          mkdir -p profile
          printf '%s' "$PROFILE_YML" > profile/profile.yml   # gitignored; never committed

      - name: Poll + notify
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.run -v

      - name: Commit new listings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: poll $(date -u +%FT%TZ)"
          git push
