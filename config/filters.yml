# Matching rules. A listing is kept if it looks like an internship, matches a track,
# matches the season window, and (if locations set) matches a location.

# Fit-score (0-100) at/above which a NEW listing fires an immediate "high-fit" alert
# email instead of waiting for the regular digest. Needs scoring active
# (ANTHROPIC_API_KEY + a filled profile); unscored listings never count as high-fit.
high_fit_threshold: 85

# Must contain one of these to count as an internship.
intern_terms:
  - intern
  - internship
  - co-op
  - coop

# Season targeting. Fall 2026 is the current test; switch to summer + 2027 for the real run.
seasons:
  - fall 2026
  - fall 2025      # some boards label off-cycle roles by the year they post
  - "2026"
# Years that, if present in the title, are allowed through.
allowed_years: ["2026", "2027"]

# Tracks: a listing is tagged with the first track whose keywords match its title.
tracks:
  ml:
    - machine learning
    - ml
    - ai
    - artificial intelligence
    - deep learning
    - research scientist
    - applied scientist
    - ml engineer
    - research engineer
    - reinforcement learning
    - computer vision
    - nlp
    - autonomy
    - perception
  # Data science as its own track. Scientist-only — 'data analyst'/'analytics'
  # is intentionally excluded (sprawls into business/ops, low precision).
  # 'data engineer' lives under swe. ml is matched first, so ML-flavored DS
  # titles still tag ml.
  data:
    - data scientist
    - data science
  swe:
    - software engineer
    - software engineering
    - swe
    - backend
    - frontend
    - full stack
    - full-stack
    - fullstack
    - developer
    - infrastructure
    - platform engineer
    - data engineer
    - mobile
    - integration engineer
  product:
    - product manager
    - product management
    - "apm"
    - associate product

# Locations: leave empty to accept all. Add substrings (case-insensitive) to restrict.
locations: []

# Drop listings clearly aimed at non-students.
# Degree gates are title-only (the JD isn't fetched). 'ms' is intentionally NOT
# excluded — it almost always appears as "BS/MS", which accepts undergrads.
exclude_terms:
  - senior
  - staff
  - principal
  - manager, engineering
  - phd
  - ph.d
  - masters
  - master's
